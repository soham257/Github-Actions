name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Upload hello.py as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-file
          path: hello.py
